<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <button onclick="negrito()">Deixar em negrito</button>
    <p id="texto">Ola</p>

</body>

<script>
    function negrito() {

        document.getElementById('texto').style.fontWeight = "bold"
    }
</script>
</html>
