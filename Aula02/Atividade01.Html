<!DOCTYPE html>
<html lang="Pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>

<body>
    <fieldset>
        <legend>Introdução</legend>
        <form>
            Email:
            <br><input type="email" placeholder="Insira um Email valido">
            <br><br>
            Quantidade de filhos
            <br>
            <input type="text">
            <br><br>
            <input type="date">
            <br><br>
            Possui Atividade extra?
            <input type="radio">Sim
            <input type="radio">Não
        </form>
    </fieldset>
    <Fieldset>
        <legend>Área de interesse</legend>
        <form>
            <input type="checkbox" name="Área de interesse" value="HTML">HTML
            <input type="checkbox" name="Área de interesse" value="CSS">CSS
            <input type="checkbox" name="Área de interesse" value="JavaScript">JavaScript
            <input type="checkbox" name="Área de interesse" value="Python">Python
            <input type="checkbox" name="Área de interesse" value="Java">Java
            <br><br>
            <select size="6">
                <optgroup label="FrontEnd">
                    <option value="HTML">HTML</option>
                    <option value="CSS">CSS</option>
                    <option value="JavaScript">JavaScript</option>
                </optgroup>
                <optgroup label="BackEnd">
                    <option value="Java">Java</option>
                    <option value="Python">Python</option>
                </optgroup>
            </select>
            <br><br>
            <input type="text">
        </form>
    </Fieldset>
    <Fieldset>
        <legend>Mensagem</legend>
        <textarea name="Mensagem" id="" rows="7" cols="40"></textarea>
        <br><br>
        <textarea name="Contrato de utilização" id="" rows="7" cols="40">
            Contrato de utilização
            1.1 Regra 1
            1.2 Regra 2
        </textarea>
        <input type="checkbox">Li e Aceito o Contrato
        <br><br>
        <input type="file" value="Escolher arquivo">
    </Fieldset>
    <br><br>
    <input type="button" value="Mandar">
    <input type="button" value="button">
    <input type="button" value="Mandar com tag button">
    <input type="button" value="Botão">
    <input type="text">
    <br><br>
    <input type="range">
    <br><br>
    <input type="tet">
    <br><br>
    <input type="color">
</body>

</html>
