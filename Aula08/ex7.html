<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input id="texto" ></input>
    <button id="botao" onclick="Caracter()"> Clique para mostrar quantos Caracteres </button>
    <h1 id="resultado"></h1>

    
</body>
<script>
    
    function Caracter() {
        let Qtd = document.getElementById('texto').value.length    
        document.getElementById('resultado').innerHTML = Qtd
    }
</script>
