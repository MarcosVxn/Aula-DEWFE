<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="cor()">Clique para mudar a cor</button>
    <h1 id="texto">Aura</h1>
</body>
<script>
    function cor () {
        
        document.getElementById('texto').style.color = "red"
    }
</script>
</html>
