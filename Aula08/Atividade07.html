<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 07 JS</title>
</head>

<body>
    <input id="campoTexto" type="text">
    <p id="paragrafo"></p>
    <button onclick="evento()">Clique para contar</button>

    <script>
        function evento() {
            let numChar = document.getElementById('campoTexto').value;
            document.getElementById('paragrafo').innerHTML = numChar.length;
        }
    </script>
</body>

</html>
