<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="horas()">Mostar horario</button>    
    <h1 id="horario"></h1>
</body>
<script>
    
    const agora = new Date()
    
    function horas() {
        document.getElementById("horario").innerHTML = agora
    }
</script>
</html>
