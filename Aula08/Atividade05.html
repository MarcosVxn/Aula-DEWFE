<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 05 JS</title>
</head>
<body>
    <p id="txt">Texto</p>
    <button onclick="mdcor()">Mude a cor</button>

    <script>
        function mdcor(){
            document.getElementById("txt")
            txt.style.color = 'red';
        }
    </script>
</body>
</html>
